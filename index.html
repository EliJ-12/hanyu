<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Learn Chinese vocabulary daily">
  <link rel="manifest" href="manifest.json">
  <title>Hanyu Daily</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Hanyu Daily</h1>
    <div class="filter">
      <label for="hsk-select">HSK Level:</label>
      <select id="hsk-select">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
    <div class="word-card">
      <div id="hanzi" class="hanzi"></div>
      <div id="pinyin" class="pinyin"></div>
      <div id="translation" class="translation"></div>
      <div id="hsk-level" class="hsk-level"></div>
    </div>
    <button id="next-btn">Next Word</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
